<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/logim.css">
    <title>Projeto escola-logim</title>
</head>

<body>
    <h1>Fale Conosco</h1>

    <form action="Comfirmation/comfirmation.html" method="get">
        <label for="email">email</label>
        <input required autofocus placeholder="@email.com" type="email" name="email" id="email" value="">

        <label for="senha">senha</label>
        <input required autofocus placeholder="@senha" type="password" name="senha" id="senha" value="">

        <label for="rpsenha">repita a senha</label>
        <input required autofocus placeholder="@Repita a senha" type="password" name="rpsenha" id="rpsenha" value="">

        <label for="nome">nome</label>
        <input required autofocus placeholder="@nome" type="text" name="nome" id="nome" value="">


        <button type="submit">enviar</button>
    </form>




    <script src="/assets/js/contato.js"></script>
</body>

</html>
